# GitHub Contribution Snake Generator Workflow
# Redesigned for Sashank's Premium Profile
#
# This Action runs daily at midnight to build a classic snake game out of your
# GitHub contributions calendar. It generates a dark mode snake SVG.
#
# Output:
# - A branch named `output` containing `github-contribution-grid-snake-dark.svg`.
#
# AUTOMATION NOTE:
# This workflow uses the default GITHUB_TOKEN provided by GitHub Actions to write
# to the repository. No external PAT secret configuration is needed for the snake.

name: Generate Contribution Snake

on:
  # Schedule: Run daily at 00:00 UTC
  schedule:
    - cron: "0 0 * * *"
  # Allow manual execution via the Actions tab
  workflow_dispatch:
  # Trigger on pushes to main branch
  push:
    branches:
      - main
      - master

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    
    steps:
      # Generates a snake game from a github user contributions graph, outputting SVGs.
      - name: Generate contribution grid snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#d4d4d8&color_dots=#161616,#27272a,#3f3f46,#52525b,#a1a1aa

      # Push the content of the dist directory to the 'output' branch.
      # The README will reference the raw URL of the file from this branch.
      - name: Push snake SVG to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
