<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 80" width="100%" height="100%">
  <defs>
    <!-- Border Fade Gradient -->
    <linearGradient id="border-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#27272a" stop-opacity="0" />
      <stop offset="30%" stop-color="#27272a" stop-opacity="0.5" />
      <stop offset="50%" stop-color="#3f3f46" stop-opacity="0.8" />
      <stop offset="70%" stop-color="#27272a" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#27272a" stop-opacity="0" />
    </linearGradient>
    
    <style>
      .footer-text {
        font-family: -apple-system, BlinkMacSystemFont, "Geist", "Inter", "Segoe UI", Roboto, sans-serif;
        font-size: 11px;
        fill: #71717a;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }
      .footer-sub {
        font-family: -apple-system, BlinkMacSystemFont, "Geist", "Inter", "Segoe UI", Roboto, sans-serif;
        font-size: 10px;
        fill: #52525b;
        letter-spacing: 0.05em;
      }
    </style>
  </defs>

  <!-- Top Divider Line -->
  <line x1="100" y1="10" x2="800" y2="10" stroke="url(#border-fade)" stroke-width="0.75" />

  <!-- Footnote -->
  <text x="450" y="42" text-anchor="middle" class="footer-text">Sashank © 2026</text>
  <text x="450" y="58" text-anchor="middle" class="footer-sub">Designed with intention. Driven by curiosity.</text>
</svg>
