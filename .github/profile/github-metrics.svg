<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="100%" height="100%">
  <defs>
    <style>
      .bg {
        fill: #090909;
        stroke: #27272a;
        stroke-width: 1;
        rx: 8;
      }
      .title {
        font-family: -apple-system, BlinkMacSystemFont, "Geist", "Inter", sans-serif;
        font-size: 14px;
        fill: #ffffff;
        font-weight: 600;
        letter-spacing: 0.05em;
      }
      .subtext {
        font-family: -apple-system, BlinkMacSystemFont, "Geist", "Inter", sans-serif;
        font-size: 12px;
        fill: #a1a1aa;
      }
      .loading {
        font-family: -apple-system, BlinkMacSystemFont, "Geist", "Inter", sans-serif;
        font-size: 11px;
        fill: #71717a;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        animation: pulse 2s infinite ease-in-out;
      }
      @keyframes pulse {
        0% { opacity: 0.4; }
        50% { opacity: 0.9; }
        100% { opacity: 0.4; }
      }
      .line {
        stroke: #27272a;
        stroke-dasharray: 4 4;
      }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  
  <line x1="20" y1="50" x2="460" y2="50" class="line" />
  
  <text x="30" y="35" class="title">Developer Insights &amp; Metrics</text>
  <text x="30" y="85" class="subtext">GitHub Actions is compiling developer habits, achievements,</text>
  <text x="30" y="105" class="subtext">contribution calendar, stars, and language metrics.</text>
  
  <g transform="translate(30, 140)">
    <circle cx="10" cy="10" r="6" fill="none" stroke="#d4d4d8" stroke-width="2" />
    <path d="M 10 4 A 6 6 0 0 1 16 10" fill="none" stroke="#ffffff" stroke-width="2" />
    <text x="25" y="14" class="loading">Metrics initialisation in progress...</text>
  </g>
</svg>
