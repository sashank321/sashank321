# GitHub Metrics Generator Workflow (Redesigned & Optimized)
#
# This workflow is optimized to build an elegant, high-impact, and minimal
# developer dashboard styled after Vercel and Stripe.
#
# - Disabled all error-prone plugins (achievements, habits, activity, followup)
# - Disabled the redundant header and repository meta lists (base: "")
# - Included custom dark mode CSS overrides and a matching #090909 background
# - Optimized API payload limits to prevent timeouts and speed up commits

name: GitHub Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Developer Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: sashank321
          template: classic
          config_timezone: Asia/Kolkata
          filename: .github/profile/github-metrics.svg
          
          # Clean architecture: Disable base info entirely to act as a custom widget
          base: ""
          
          # Visual settings
          config_background: "#090909"
          config_padding: 8%
          
          # 1. Plugin: Languages (Displays top languages used)
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          # Optimization: Limit scanning to 150 recent events / 30 days to speed up generation
          plugin_languages_recent_load: 150
          plugin_languages_recent_days: 30
          
          # 2. Plugin: Contribution Calendar (Activity grid)
          plugin_calendar: yes
          plugin_calendar_limit: 1
          
          # 3. Plugin: Lines of code (displays total commits & lines of code changed)
          plugin_lines: yes
          
          # Custom Styling to enforce Apple/Linear/Vercel aesthetics
          extra_css: |
            svg {
              background: #090909 !important;
              border: 1px solid #1f1f23 !important;
              border-radius: 12px !important;
            }
            h2, h3 {
              font-family: -apple-system, BlinkMacSystemFont, "Geist", "Inter", "Segoe UI", sans-serif !important;
              color: #ffffff !important;
              font-weight: 600 !important;
              letter-spacing: -0.02em !important;
              border-bottom: none !important;
              padding-bottom: 0 !important;
              margin-bottom: 12px !important;
            }
            .field {
              font-family: -apple-system, BlinkMacSystemFont, "Geist", "Inter", "Segoe UI", sans-serif !important;
              color: #a1a1aa !important;
              font-size: 13px !important;
            }
            .field svg {
              fill: #71717a !important;
              margin-right: 10px !important;
            }
            .calendar .day {
              outline: 1px solid #141416 !important;
            }
            footer {
              font-family: -apple-system, BlinkMacSystemFont, "Geist", "Inter", sans-serif !important;
              color: #3f3f46 !important;
              border-top: 1px solid #1f1f23 !important;
              padding-top: 8px !important;
              margin-top: 16px !important;
            }
