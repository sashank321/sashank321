<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 20" width="100%" height="100%">
  <defs>
    <!-- Fade-out Gradient for Divider Line -->
    <linearGradient id="divider-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#27272a" stop-opacity="0" />
      <stop offset="20%" stop-color="#52525b" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#d4d4d8" stop-opacity="0.8" />
      <stop offset="80%" stop-color="#52525b" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#27272a" stop-opacity="0" />
    </linearGradient>
  </defs>
  
  <!-- Wave Path -->
  <path d="M 0 10 C 225 2, 225 18, 450 10 C 675 2, 675 18, 900 10" fill="none" stroke="url(#divider-grad)" stroke-width="1.25" />
</svg>
